services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_dashboard
      POSTGRES_USER: agent_dashboard
      POSTGRES_PASSWORD: agent_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_dashboard -d agent_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
